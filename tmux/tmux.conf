set -g prefix ^A

set -g mouse on
set -g base-index 1
set -g status-position bottom
set -g renumber-windows on
setw -g mode-keys vi

bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

bind-key C-n run-shell 'tmux-sessionizer "/Users/weisin/Library/Mobile Documents/iCloud~md~obsidian/Documents/ws-vault"'
bind-key C-c run-shell 'tmux-sessionizer ~/software-engineering/projects/dotfiles'
bind-key C-b run-shell 'tmux-sessionizer ~/software-engineering/projects/my-money-app/my-money-app-backend'
bind-key C-f run-shell 'tmux-sessionizer ~/software-engineering/projects/my-money-app/my-money-app-frontend'

# claude sessions: prefix Space, then the same project key
bind-key Space switch-client -T claude
bind-key -T claude C-n run-shell 'tmux-sessionizer -c "/Users/weisin/Library/Mobile Documents/iCloud~md~obsidian/Documents/ws-vault"'
bind-key -T claude C-c run-shell 'tmux-sessionizer -c ~/software-engineering/projects/dotfiles'
bind-key -T claude C-b run-shell 'tmux-sessionizer -c ~/software-engineering/projects/my-money-app/my-money-app-backend'
bind-key -T claude C-f run-shell 'tmux-sessionizer -c ~/software-engineering/projects/my-money-app/my-money-app-frontend'

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# colourscheme
set -g @plugin 'catppuccin/tmux'
set -g @catppuccin_flavor 'mocha'
set -g status-right-length 100
set -g status-left-length 100
set -g status-left "#{E:@catppuccin_status_session}"
set -g status-right ""
set -g @catppuccin_status_background "none"
set -g @catppuccin_status_module_bg_color "default"
set -g @catppuccin_status_left_separator "█"

set -g @catppuccin_session_color "#{?client_prefix,#f38ba8,#79c0ff}"

set -g @catppuccin_window_status_style "none"

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'

set -g window-status-format "#[fg=#6c7086,bg=default]#I:#W "
set -g window-status-current-format "#[fg=#58a6ff,bg=default,bold]#I:#[fg=#58a6ff]#W#{?window_zoomed_flag,(),} "
